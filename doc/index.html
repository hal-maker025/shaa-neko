<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>シャーシャー猫</title>
<style>
  :root{
    --night:#1b2137;
    --night-deep:#12162a;
    --moon:#f6e7c1;
    --fur:#e8e4dc;
    --fur-shadow:#c9c2b4;
    --hiss-pink:#ff5d7a;
    --calm-green:#8fd6a8;
    --ink:#2a2f45;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:"Hiragino Maru Gothic ProN","BIZ UDGothic","Yu Gothic",sans-serif;
    background:radial-gradient(ellipse at 50% 20%, #2a3150 0%, var(--night) 45%, var(--night-deep) 100%);
    color:var(--moon);
    display:flex;flex-direction:column;align-items:center;
    min-height:100%;overflow-x:hidden;
    transition:background .3s;
  }
  body.hissing{
    background:radial-gradient(ellipse at 50% 20%, #4a2135 0%, #331528 45%, #200d1a 100%);
  }

  header{
    padding:20px 16px 4px;text-align:center;
  }
  h1{
    font-size:1.25rem;letter-spacing:.35em;font-weight:800;
  }
  .tagline{
    font-size:.7rem;opacity:.55;letter-spacing:.15em;margin-top:6px;
  }

  /* ===== 猫ステージ ===== */
  .stage{
    position:relative;width:min(92vw,380px);aspect-ratio:1/1;
    display:flex;align-items:center;justify-content:center;
    margin-top:4px;
  }
  .hiss-bubble{
    position:absolute;top:2%;left:50%;transform:translateX(-50%) scale(0);
    background:var(--hiss-pink);color:#fff;
    font-weight:900;font-size:1.7rem;letter-spacing:.1em;
    padding:12px 22px;border-radius:24px 24px 24px 4px;
    transition:transform .12s cubic-bezier(.34,1.56,.64,1);
    z-index:5;white-space:nowrap;
    box-shadow:0 6px 24px rgba(255,93,122,.45);
  }
  body.hissing .hiss-bubble{transform:translateX(-50%) scale(1) rotate(-3deg)}
  .zzz{
    position:absolute;top:14%;right:16%;font-size:1.3rem;opacity:0;color:var(--moon);
    animation:none;z-index:5;
  }
  body.calm .zzz{opacity:.8;animation:floatz 2.6s ease-in-out infinite}
  @keyframes floatz{
    0%{transform:translateY(0) scale(.9);opacity:.4}
    50%{transform:translateY(-14px) scale(1.05);opacity:.9}
    100%{transform:translateY(-26px) scale(.9);opacity:0}
  }

  svg#cat{width:88%;height:auto;overflow:visible}
  #catBody{transition:transform .15s}
  body.hissing #catBody{animation:shake .12s infinite}
  @keyframes shake{
    0%{transform:translateX(-2px) rotate(-.6deg)}
    50%{transform:translateX(2px) rotate(.6deg)}
    100%{transform:translateX(-2px) rotate(-.6deg)}
  }
  /* 表情の切替 */
  .face-calm,.face-alert,.face-hiss{transition:opacity .1s}
  .face-alert,.face-hiss{opacity:0}
  body.alert .face-calm{opacity:0}
  body.alert .face-alert{opacity:1}
  body.hissing .face-calm,body.hissing .face-alert{opacity:0}
  body.hissing .face-hiss{opacity:1}
  /* 逆立つ毛 */
  .spikes{opacity:0;transition:opacity .1s}
  body.hissing .spikes{opacity:1}
  /* しっぽ */
  #tail{transform-origin:20% 90%;animation:tailSway 3.5s ease-in-out infinite}
  body.hissing #tail{animation:tailPuff .18s infinite}
  @keyframes tailSway{0%,100%{transform:rotate(0)}50%{transform:rotate(9deg)}}
  @keyframes tailPuff{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(6deg)}}

  /* ===== メーター ===== */
  .meter-wrap{
    width:min(92vw,380px);margin-top:2px;
  }
  .meter-label{
    display:flex;justify-content:space-between;font-size:.68rem;opacity:.6;margin-bottom:5px;
    letter-spacing:.08em;
  }
  .meter{
    height:14px;border-radius:7px;background:rgba(255,255,255,.09);
    position:relative;overflow:hidden;
  }
  .meter-fill{
    height:100%;width:0%;border-radius:7px;
    background:linear-gradient(90deg,var(--calm-green),#ffd97a 60%,var(--hiss-pink));
    transition:width .06s linear;
  }
  .meter-threshold{
    position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--hiss-pink);
    box-shadow:0 0 6px var(--hiss-pink);
  }

  /* ===== コントロール ===== */
  .controls{
    width:min(92vw,380px);margin:16px 0 28px;display:flex;flex-direction:column;gap:12px;
  }
  button{
    font-family:inherit;font-weight:800;font-size:1rem;letter-spacing:.12em;
    border:none;border-radius:16px;padding:15px;cursor:pointer;
    transition:transform .08s, box-shadow .2s;
  }
  button:active{transform:scale(.97)}
  #micBtn{
    background:var(--moon);color:var(--ink);
    box-shadow:0 4px 18px rgba(246,231,193,.25);
  }
  #micBtn.on{
    background:var(--hiss-pink);color:#fff;
    box-shadow:0 4px 18px rgba(255,93,122,.4);
  }
  #testBtn{
    background:rgba(255,255,255,.1);color:var(--moon);
    border:1px solid rgba(255,255,255,.2);
  }
  #sysBtn{
    background:rgba(143,214,168,.15);color:var(--calm-green);
    border:1px solid rgba(143,214,168,.4);
  }
  #sysBtn.on{
    background:var(--calm-green);color:var(--ink);
    box-shadow:0 4px 18px rgba(143,214,168,.4);
  }
  .row{
    display:flex;align-items:center;gap:12px;
    background:rgba(255,255,255,.06);border-radius:14px;padding:12px 14px;
  }
  .row label{font-size:.75rem;letter-spacing:.1em;opacity:.75;white-space:nowrap}
  input[type=range]{
    flex:1;accent-color:var(--hiss-pink);height:22px;
  }
  .toggle{
    display:flex;justify-content:space-between;align-items:center;
    background:rgba(255,255,255,.06);border-radius:14px;padding:12px 14px;
    font-size:.75rem;letter-spacing:.1em;
  }
  .switch{position:relative;width:46px;height:26px}
  .switch input{opacity:0;width:0;height:0}
  .slider-ui{
    position:absolute;inset:0;background:rgba(255,255,255,.18);border-radius:13px;
    transition:.2s;cursor:pointer;
  }
  .slider-ui::before{
    content:"";position:absolute;width:20px;height:20px;border-radius:50%;
    background:#fff;top:3px;left:3px;transition:.2s;
  }
  .switch input:checked + .slider-ui{background:var(--hiss-pink)}
  .switch input:checked + .slider-ui::before{transform:translateX(20px)}

  .counter{
    text-align:center;font-size:.72rem;letter-spacing:.15em;opacity:.6;
  }
  .counter strong{
    font-size:1.1rem;color:var(--hiss-pink);letter-spacing:.05em;
  }
  .note{
    width:min(92vw,380px);font-size:.65rem;line-height:1.7;opacity:.45;
    margin-bottom:32px;text-align:center;
  }
  #errMsg{
    display:none;width:min(92vw,380px);background:rgba(255,93,122,.15);
    border:1px solid rgba(255,93,122,.4);border-radius:12px;
    padding:12px;font-size:.72rem;line-height:1.7;margin-bottom:12px;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important}
  }
</style>
</head>
<body class="calm">

<header>
  <h1>シャーシャー猫</h1>
  <p class="tagline">怒鳴り声は、猫の威嚇に変換されます</p>
</header>

<div class="stage">
  <div class="hiss-bubble">シャーッ!!</div>
  <div class="zzz">Z z z…</div>

  <svg id="cat" viewBox="0 0 300 300" aria-label="猫">
    <g id="catBody">
      <!-- しっぽ -->
      <g id="tail">
        <path d="M225 235 Q275 225 268 175 Q264 150 245 150" fill="none"
              stroke="var(--fur)" stroke-width="22" stroke-linecap="round"/>
      </g>
      <!-- 逆立つ毛(威嚇時) -->
      <g class="spikes" stroke="var(--fur)" stroke-width="7" stroke-linecap="round">
        <line x1="95" y1="130" x2="78" y2="112"/>
        <line x1="120" y1="118" x2="112" y2="96"/>
        <line x1="180" y1="118" x2="188" y2="96"/>
        <line x1="205" y1="130" x2="222" y2="112"/>
        <line x1="88" y1="185" x2="66" y2="180"/>
        <line x1="212" y1="185" x2="234" y2="180"/>
      </g>
      <!-- 体 -->
      <ellipse cx="150" cy="215" rx="82" ry="60" fill="var(--fur)"/>
      <!-- 頭 -->
      <circle cx="150" cy="150" r="62" fill="var(--fur)"/>
      <!-- 耳 -->
      <path d="M100 118 L92 72 L132 96 Z" fill="var(--fur)"/>
      <path d="M200 118 L208 72 L168 96 Z" fill="var(--fur)"/>
      <path d="M104 110 L100 84 L124 98 Z" fill="#f2b8c0"/>
      <path d="M196 110 L200 84 L176 98 Z" fill="#f2b8c0"/>
      <!-- 縞模様 -->
      <path d="M132 92 Q150 84 168 92" stroke="var(--fur-shadow)" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M138 102 Q150 96 162 102" stroke="var(--fur-shadow)" stroke-width="5" fill="none" stroke-linecap="round"/>

      <!-- ===== 顔:まったり ===== -->
      <g class="face-calm">
        <path d="M118 152 Q126 158 134 152" stroke="var(--ink)" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M166 152 Q174 158 182 152" stroke="var(--ink)" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M144 168 L150 173 L156 168 Z" fill="#f2a5b0"/>
        <path d="M150 173 Q150 180 143 182 M150 173 Q150 180 157 182" stroke="var(--ink)" stroke-width="3" fill="none" stroke-linecap="round"/>
      </g>

      <!-- ===== 顔:警戒 ===== -->
      <g class="face-alert">
        <circle cx="126" cy="152" r="7" fill="var(--ink)"/>
        <circle cx="174" cy="152" r="7" fill="var(--ink)"/>
        <circle cx="128" cy="150" r="2.5" fill="#fff"/>
        <circle cx="176" cy="150" r="2.5" fill="#fff"/>
        <path d="M144 170 L150 175 L156 170 Z" fill="#f2a5b0"/>
        <line x1="143" y1="183" x2="157" y2="183" stroke="var(--ink)" stroke-width="3" stroke-linecap="round"/>
      </g>

      <!-- ===== 顔:シャー!! ===== -->
      <g class="face-hiss">
        <path d="M114 144 L138 154" stroke="var(--ink)" stroke-width="5" stroke-linecap="round"/>
        <path d="M186 144 L162 154" stroke="var(--ink)" stroke-width="5" stroke-linecap="round"/>
        <path d="M144 166 L150 171 L156 166 Z" fill="#f2a5b0"/>
        <!-- 開いた口と牙 -->
        <path d="M130 180 Q150 202 170 180 Q150 192 130 180 Z" fill="#7a2436"/>
        <path d="M136 181 L140 190 L145 182 Z" fill="#fff"/>
        <path d="M164 181 L160 190 L155 182 Z" fill="#fff"/>
      </g>

      <!-- ひげ -->
      <g stroke="var(--fur-shadow)" stroke-width="2.5" stroke-linecap="round">
        <line x1="96" y1="160" x2="66" y2="154"/>
        <line x1="96" y1="170" x2="66" y2="172"/>
        <line x1="204" y1="160" x2="234" y2="154"/>
        <line x1="204" y1="170" x2="234" y2="172"/>
      </g>
      <!-- 前足 -->
      <ellipse cx="118" cy="262" rx="20" ry="12" fill="var(--fur)"/>
      <ellipse cx="182" cy="262" rx="20" ry="12" fill="var(--fur)"/>
    </g>
  </svg>
</div>

<div class="meter-wrap">
  <div class="meter-label"><span>相手の声の大きさ</span><span>ここを超えるとシャー →</span></div>
  <div class="meter">
    <div class="meter-fill" id="meterFill"></div>
    <div class="meter-threshold" id="thresholdMark"></div>
  </div>
</div>

<div class="controls">
  <div id="errMsg"></div>
  <button id="micBtn">🎙 マイクをオンにする</button>
  <button id="sysBtn">🎧 通話音声をひろう（ヘッドホン用・PC）</button>
  <button id="testBtn">👆 タップでシャー（動作テスト）</button>
  <div class="row">
    <label>感度</label>
    <input type="range" id="sens" min="5" max="60" value="25">
  </div>
  <div class="toggle">
    <span>猫の鳴き声（シャー音）を出す</span>
    <label class="switch">
      <input type="checkbox" id="soundToggle">
      <span class="slider-ui"></span>
    </label>
  </div>
  <p class="counter">本日の威嚇回数 <strong id="count">0</strong> シャー</p>
</div>

<p class="note">
  スピーカー通話なら「マイク」、ヘッドホン通話（PC）なら「通話音声をひろう」。<br>
  🎧の場合は共有ダイアログで通話ソフトのタブを選び「音声を共有」にチェック。<br>
  相手の声が大きくなるほど、猫が代わりに応戦してくれます。<br>
  ※音声はどこにも送信・保存されません。この画面の中だけで処理されます。
</p>

<script>
(function(){
  const body = document.body;
  const meterFill = document.getElementById('meterFill');
  const thresholdMark = document.getElementById('thresholdMark');
  const sens = document.getElementById('sens');
  const micBtn = document.getElementById('micBtn');
  const testBtn = document.getElementById('testBtn');
  const soundToggle = document.getElementById('soundToggle');
  const countEl = document.getElementById('count');
  const errMsg = document.getElementById('errMsg');

  let audioCtx = null, analyser = null, micStream = null, running = false;
  let hissCount = 0, hissLock = false, hissTimer = null;
  let smooth = 0;

  function threshold(){ return 65 - parseInt(sens.value,10); } // 感度高=閾値低
  function updateThresholdMark(){ thresholdMark.style.left = threshold() + '%'; }
  sens.addEventListener('input', updateThresholdMark);
  updateThresholdMark();

  function setState(s){
    body.classList.remove('calm','alert','hissing');
    body.classList.add(s);
  }

  function playHissSound(){
    if(!soundToggle.checked) return;
    try{
      if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      const dur = 0.7;
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*dur, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for(let i=0;i<d.length;i++){ d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 1.5); }
      const src = audioCtx.createBufferSource(); src.buffer = buf;
      const bp = audioCtx.createBiquadFilter();
      bp.type='bandpass'; bp.frequency.value=4200; bp.Q.value=0.7;
      const g = audioCtx.createGain(); g.gain.value=0.5;
      src.connect(bp).connect(g).connect(audioCtx.destination);
      src.start();
    }catch(e){}
  }

  function triggerHiss(){
    setState('hissing');
    if(!hissLock){
      hissLock = true;
      hissCount++; countEl.textContent = hissCount;
      playHissSound();
      if(navigator.vibrate) navigator.vibrate([60,40,60]);
      setTimeout(()=>{ hissLock=false; }, 900);
    }
    clearTimeout(hissTimer);
    hissTimer = setTimeout(()=>{
      setState(running ? 'alert' : 'calm');
      if(!running) setTimeout(()=>setState('calm'), 400);
    }, 800);
  }

  testBtn.addEventListener('click', triggerHiss);

  function loop(){
    if(!running) return;
    const data = new Uint8Array(analyser.fftSize);
    analyser.getByteTimeDomainData(data);
    let sum = 0;
    for(let i=0;i<data.length;i++){ const v=(data[i]-128)/128; sum += v*v; }
    const rms = Math.sqrt(sum/data.length);
    const level = Math.min(100, rms * 400);
    smooth = smooth*0.7 + level*0.3;
    meterFill.style.width = smooth + '%';

    const t = threshold();
    if(smooth >= t){
      triggerHiss();
    } else if(smooth >= t*0.55){
      if(!body.classList.contains('hissing')) setState('alert');
    } else {
      if(!body.classList.contains('hissing')) setState('calm');
    }
    requestAnimationFrame(loop);
  }

  const sysBtn = document.getElementById('sysBtn');
  let sourceMode = null; // 'mic' | 'sys'

  function attachStream(stream, mode){
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    const src = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    src.connect(analyser);
    micStream = stream;
    sourceMode = mode;
    running = true;
    errMsg.style.display='none';
    updateButtons();
    loop();
    // ブラウザ側で共有停止された場合にも対応
    stream.getTracks().forEach(t=> t.onended = stopAll);
  }

  function updateButtons(){
    micBtn.textContent = (running && sourceMode==='mic') ? '⏹ マイクをオフにする' : '🎙 マイクをオンにする';
    micBtn.classList.toggle('on', running && sourceMode==='mic');
    sysBtn.textContent = (running && sourceMode==='sys') ? '⏹ 通話音声の取得を停止' : '🎧 通話音声をひろう（ヘッドホン用・PC）';
    sysBtn.classList.toggle('on', running && sourceMode==='sys');
  }

  function stopAll(){
    running = false;
    if(micStream){ micStream.getTracks().forEach(t=>t.stop()); micStream=null; }
    sourceMode = null;
    updateButtons();
    meterFill.style.width = '0%';
    setState('calm');
  }

  async function startMic(){
    stopAll();
    try{
      const stream = await navigator.mediaDevices.getUserMedia({audio:{
        echoCancellation:false, noiseSuppression:false, autoGainControl:false
      }});
      attachStream(stream, 'mic');
    }catch(e){
      errMsg.style.display='block';
      errMsg.textContent = 'マイクを使えませんでした。この画面（プレビュー内）ではマイクがブロックされる場合があります。ファイルをダウンロードして、SafariやChromeで直接開くと動きます。「タップでシャー」ボタンでは今すぐ動作確認できます。';
    }
  }

  async function startSys(){
    stopAll();
    try{
      // 画面共有APIで通話ソフトのタブ/システム音声を取得（PCのChrome/Edge向け）
      const stream = await navigator.mediaDevices.getDisplayMedia({
        video:true,
        audio:{echoCancellation:false, noiseSuppression:false, autoGainControl:false}
      });
      const audioTracks = stream.getAudioTracks();
      if(audioTracks.length === 0){
        stream.getTracks().forEach(t=>t.stop());
        errMsg.style.display='block';
        errMsg.textContent = '音声が含まれていませんでした。共有ダイアログで通話ソフトのタブか画面全体を選び、「音声を共有」（システム音声／タブの音声）のチェックを必ずオンにしてください。';
        return;
      }
      // 映像は使わないので停止し、音声だけ解析
      stream.getVideoTracks().forEach(t=>t.stop());
      attachStream(new MediaStream(audioTracks), 'sys');
    }catch(e){
      errMsg.style.display='block';
      errMsg.textContent = '通話音声を取得できませんでした。この機能はPCのChrome / Edgeで使えます。共有ダイアログで通話ソフトのタブか画面を選び、「音声を共有」にチェックを入れてください。';
    }
  }

  micBtn.addEventListener('click', ()=> (running && sourceMode==='mic') ? stopAll() : startMic());
  sysBtn.addEventListener('click', ()=> (running && sourceMode==='sys') ? stopAll() : startSys());
})();
</script>
</body>
</html>
